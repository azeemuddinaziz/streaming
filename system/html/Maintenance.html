<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streamsouk | Coming Soon</title>
    <style>
      :root {
        --bg: #ffffff;
        --text-main: #000000;
        --text-dim: #666666;
        --border: #eeeeee;
        --accent: #000000;
      }

      * {
        box-sizing: border-box;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
        100% {
          opacity: 1;
        }
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        animation: fadeIn 0.8s ease-out;
      }

      /* Left Side */
      .hero-section {
        flex: 1.2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 10%;
      }

      .status-container {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 2rem;
      }

      .dot {
        width: 8px;
        height: 8px;
        background: var(--text-main);
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      .status-text {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        font-size: 3rem;
        font-weight: 800;
        margin: 0;
        letter-spacing: -0.02em;
      }

      #maint-msg {
        font-size: 1.1rem;
        color: var(--text-dim);
        margin: 1.5rem 0 3rem 0;
        line-height: 1.6;
        max-width: 440px;
      }

      .input-group {
        display: flex;
        max-width: 400px;
        border-bottom: 2px solid var(--text-main);
        padding-bottom: 8px;
        transition: border-color 0.3s;
        margin-bottom: 2rem; /* Spacing for the GitHub link below */
      }

      .input-group:focus-within {
        border-color: #999;
      }

      input[type="email"] {
        flex: 1;
        border: none;
        outline: none;
        font-size: 1rem;
        padding: 8px 0;
        background: transparent;
      }

      button {
        background: none;
        border: none;
        font-weight: 700;
        cursor: pointer;
        padding: 0 10px;
        transition: transform 0.2s;
      }

      button:hover {
        transform: translateX(5px);
      }

      /* GitHub Link Style */
      .github-link {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--text-dim);
        font-size: 0.9rem;
        font-weight: 500;
        width: fit-content;
        transition: color 0.2s;
      }

      .github-link:hover {
        color: var(--text-main);
      }

      .github-link svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      /* Hidden Blog Section as per your request */
      .blog-section {
        display: none;
      }

      @media (max-width: 900px) {
        body {
          flex-direction: column;
          height: auto;
        }
        .hero-section {
          padding: 80px 10%;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero-section">
      <div class="status-container">
        <div class="dot"></div>
        <span class="status-text">Building Phase</span>
      </div>

      <h1>Streamsouk.</h1>
      <p id="maint-msg">
        We are currently refining the platform. Enter your email to receive an
        invite when we go live.
      </p>

      <form id="waitlist-form" class="input-group">
        <input type="email" id="email" placeholder="Email address" required />
        <button type="submit">→</button>
      </form>

      <div
        id="message"
        style="font-size: 0.9rem; margin-bottom: 2rem; font-weight: 500"
      ></div>

      <a
        href="https://github.com/azeemuddinaziz/streaming"
        class="github-link"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg viewBox="0 0 24 24">
          <path
            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
          />
        </svg>
        Follow our progress on GitHub
      </a>
    </section>

    <script>
      document
        .getElementById("waitlist-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const emailInput = document.getElementById("email");
          const messageDiv = document.getElementById("message");
          const submitBtn = this.querySelector("button");
          const email = emailInput.value;

          // Visual feedback while submitting
          messageDiv.innerText = "Submitting...";
          messageDiv.style.color = "var(--text-dim)";
          submitBtn.disabled = true;

          try {
            // Pointing to your local Node server for testing
            const response = await fetch("/api/waitlist", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ email: email }),
            });

            const data = await response.json();

            if (response.ok) {
              messageDiv.innerText = "✓ " + data.message;
              messageDiv.style.color = "green";
              emailInput.value = ""; // Clear the input box
            } else {
              messageDiv.innerText = "Error: " + data.error;
              messageDiv.style.color = "red";
            }
          } catch (error) {
            console.error("Fetch error:", error);
            messageDiv.innerText =
              "Failed to connect to the server. Is it running?";
            messageDiv.style.color = "red";
          } finally {
            submitBtn.disabled = false; // Re-enable the button
          }
        });
    </script>
  </body>
</html>
